name: CD

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to deploy (e.g. v1.1.0 or latest)"
        required: true
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (with auto-rollback on failed health check)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            set -e
            NEW_VERSION="${{ inputs.version }}"
            PREV_VERSION=$(cat ~/.peex-current-version 2>/dev/null || echo "")

            deploy_version() {
              docker pull ghcr.io/${{ github.repository }}:"$1"
              docker stop sample-app || true
              docker rm sample-app || true
              docker run -d --name sample-app -p 8000:8000 \
                -e APP_VERSION="$1" \
                ghcr.io/${{ github.repository }}:"$1"
            }

            deploy_version "$NEW_VERSION"
            sleep 5

            if curl -f http://localhost:8000/; then
              echo "$NEW_VERSION" > ~/.peex-current-version
              echo "Deployment succeeded: $NEW_VERSION"
            else
              echo "Health check failed for $NEW_VERSION"
              if [ -n "$PREV_VERSION" ]; then
                echo "Auto-rolling back to last known-good version: $PREV_VERSION"
                deploy_version "$PREV_VERSION"
                sleep 5
                curl -f http://localhost:8000/
                echo "Rollback complete - service restored on $PREV_VERSION"
              else
                echo "No previous known-good version recorded - cannot auto-rollback"
              fi
              exit 1
            fi

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            ICON="✅"
            STATUS="succeeded"
          else
            ICON="❌"
            STATUS="failed"
          fi

          TEXT="$ICON Deployment $STATUS
          Version: ${{ inputs.version }}
          Triggered by: ${{ github.actor }}
          Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            --data-urlencode "chat_id=$CHAT_ID" \
            --data-urlencode "text=$TEXT"
